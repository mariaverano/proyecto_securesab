{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'css/estilosC.css' %}" />
    <title>Coordinador - SecureSab</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="user-info">
            <div class="header-right">
                <div id="notifWidget">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge">3</span>
                </div>
                <div class="header-divider"></div>
                <div class="user-menu-container">
                    <div class="user-menu" id="userMenuBtn">
                        <i class="fas fa-user-circle user-photo"></i>
                        <span class="user-name">Juan Coordinador</span>
                        <i class="fas fa-chevron-down" style="font-size: 0.7rem; color: #94a3b8;"></i>
                    </div>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="{% url 'reporte_monitoreo:mi_perfil' %}"><i class="fas fa-user"></i> Ver Perfil</a>
                        <a href="{% url 'landing' %}" class="logout-item"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Bienvenido<br>Coordinador</h2>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <nav>
            <ul id="menu">
                <li><a href="{% url 'reporte_monitoreo:inicio' %}" class="active"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="{% url 'reporte_monitoreo:asistencia_ambiente' %}"><i class="fas fa-chalkboard"></i> Asistencia Ambiente</a></li>
                <li><a href="{% url 'reporte_monitoreo:asistencia_sede' %}"><i class="fas fa-building"></i> Asistencia Sede</a></li>
                <li><a href="{% url 'reporte_monitoreo:crear_novedad' %}"><i class="fas fa-plus-circle"></i> Crear Novedad</a></li>
                <li><a href="{% url 'reporte_monitoreo:justificaciones' %}"><i class="fas fa-file-alt"></i> Justificaciones</a></li>
                <li><a href="{% url 'reporte_monitoreo:mi_perfil' %}"><i class="fas fa-user"></i> Mi Perfil</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Contenido principal -->
    <main class="main-content-wrapper" id="mainContent">
        <!-- El contenido se carga aquí -->
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{% static 'js/LogicaC.js' %}"></script>
    <script>
        // Inicializar funciones globales
        initSidebarToggle();
        initUserDropdown();

        // Marcar enlace activo
        const currentPage = window.location.pathname.split('/').pop();
        document.querySelectorAll('#menu a').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
