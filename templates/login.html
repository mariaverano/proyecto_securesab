{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SecureSab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <p class="logo">
            <span class="secure">secure</span><span class="sab">Sab</span>
        </p>
    </div>

    <!-- Mensaje de error (oculto por defecto) -->
    <div class="alert-error" id="alertError" style="display: none;">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMessage">Credenciales incorrectas</span>
    </div>

    <!-- Formulario de Login -->
    <form id="loginForm">
        <div class="input-group">
            <label for="cedula">Cédula:</label>
            <input type="text" 
                   id="cedula" 
                   name="cedula" 
                   required 
                   autofocus 
                   placeholder="Cédula">
        </div>

        <div class="input-group">
            <label for="password">Contraseña:</label>
            <input type="password" 
                   id="password" 
                   name="password" 
                   required 
                   placeholder="Contraseña">
        </div>

        <button type="submit" class="login-btn">Acceder</button>

        <p class="register-link">
            ¿No tienes una cuenta? <a href="#">Regístrate aquí</a>
        </p>
    </form>
</div>

<script src="{% static 'js/login.js' %}?v=3"></script>
</body>
</html>
